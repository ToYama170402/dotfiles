general {
    lock_cmd = pidof hyprlock || hyprlock  # 既にロック中か確認し、実行中でなければ hyprlock を起動
    unlock_cmd = pkill hyprlock            # (ロック解除時に実行するコマンド。通常は不要)
    before_sleep_cmd = loginctl lock-session # スリープ前にもロック
}

