# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1.0
monitor = eDP-1, 1920x1200@40, 0x0, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = nixGL alacritty
$fileManager = nixGL alacritty -e joshuto
$menu = wofi --show drun --allow-images --allow-markup
$browser = zen-browser


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORM
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORM
exec-once = fcitx5 -d &
exec-once = dunst &
exec-once = waybar
exec-once = hyprpaper
exec-once = /usr/lib/gnome-keyring/daemon --start --components=pkcs11,secrets,ssh &
# exec-once = light-locker --lock-on-suspend &
exec-once = nm-applet --indicator &
# exec = gammastep
exec-once = hypridle
exec-once = warp-taskbar
exec-once = flameshot
exec-once = xremap /home/toyama/.config/xremap/config.yml

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16

env = GTK_IM_MODULE,
env = QT_IM_MODULE,fcitx    
env = XMODIFIERS,@im=fcitx  
env = SDL_IM_MODULE,fcitx   
env = GLFW_IM_MODULE,fcitx

env = QT_QPA_PLATFORM,wayland

env = PATH,$HOME/.nix-profile/bin:$PATH

# env = XDG_SESSION_TYPE=x11

###################
### PERMISSIONS ###
###################

