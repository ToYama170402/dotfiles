#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 1
    gaps_out = 0

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(FFC107ee) rgba(FF5722ee) 45deg
    col.inactive_border = rgba(262626aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(262626ee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

layerrule {
    name = wofi blur
    blur = on
    match:title = wofi
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    
    
    
    
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     5.00,  almostLinear, fade
    animation = workspacesIn,  1,     3.09,  easeOutQuint, slide
    animation = workspacesOut, 1,     3.00,  easeOutQuint, slide
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = jp
    # kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.
    # accel_profile = flat

    touchpad {
        natural_scroll = true
	scroll_factor = 0.4
    }
}

gestures {
    workspace_swipe_distance = 170
    workspace_swipe_cancel_ratio = 0.1
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 4, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
# --- [ 6. Key Bindings (i3-wm から移植) ] ---

$mainMod = ALT

# マウスボタンにDeleteを割り当てる
bind = , mouse:276, exec, wtype -k Delete

# ターミナル (alacritty) の起動: Mod1+Return
bind = $mainMod, RETURN, exec, $terminal

# ファイルマネージャー (joshuto) の起動: Mod1+E
bind = $mainMod, E, exec, $fileManager

# ブラウザを起動
bind = $mainMod, B, exec, $browser

# サスペンド: Mod1+Shift+S
# bind = $mainMod SHIFT, S, exec, systemctl suspend

# btop の起動: Ctrl+Shift+Escape
bind = CONTROL SHIFT, ESCAPE, exec, nixGL alacritty -e btop

# ディスプレイ輝度調整
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# 夜間モード
bind = , XF86TouchpadToggle, exec, ~/.config/hypr/switch_night_mode.sh

# 音量調整 (pamixerを使用): XF86Audio...
bind = , XF86AudioRaiseVolume, exec, pamixer -i 2
bind = , XF86AudioLowerVolume, exec, pamixer -d 2
bind = , XF86AudioMute, exec, pamixer -t

bind = , Print, exec, flameshot gui
# ファイルに保存したい場合は以下も設定
# bind = SHIFT, PRINT, exec, grim -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y%m%d_%H%M%S)_select.png

# フォーカス中のウィンドウを閉じる: Mod1+F4
# i3の `Mod1+F4 kill` は Hyprlandでは `ALT, F4, killactive,` になります。
bind = ALT, F4, killactive,

# アプリケーションランチャー (rofi/wofi): Mod1+Space
bind = $mainMod, SPACE, exec, $menu

# フォーカス移動 (hjkl): Mod1+H/J/K/L
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, Tab, cyclenext, next

# ウィンドウの移動: Mod1+Shift+H/J/K/L
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# フルスクリーン: Mod1+F
bind = $mainMod, F, fullscreen, 0

# レイアウト切り替え (i3: tabbed/split)
# Hyprlandはデフォルトでタスクバーがないため、Tabbedレイアウトはあまり使われません。
# 通常は Dwindle/Master レイアウトを使いますが、i3のトグルsplitは利用可能です。
# bind = $mainMod, Q, layoutmsg, orientation next # i3のトグルsplitに近い動作
# bind = $mainMod, W, layoutmsg, orientation next # Tabbedレイアウトの代替

# フローティングトグル: Mod1+Shift+Space
bind = $mainMod SHIFT, SPACE, togglefloating,

# 親コンテナにフォーカス: Mod1+A
# bind = $mainMod, A, focusparent,

# ワークスペース切り替え: Mod1+1～0
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod CONTROL, Tab, workspace, m+1

# ワークスペース移動 (Prev/Next): Mod1+Ctrl+Left/Right, Mod1+Ctrl+H/L
# bind = $mainMod CONTROL, LEFT, workspace, -1
bind = $mainMod CONTROL, H, workspace, m-1
# bind = $mainMod CONTROL, RIGHT, workspace, +1
bind = $mainMod CONTROL, L, workspace, +1


# ウィンドウをワークスペースに移動: Mod1+Shift+1～0
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ワークスペースのモニター間移動
bind = $mainMod CONTROL SHIFT, h, movecurrentworkspacetomonitor, l
bind = $mainMod CONTROL SHIFT, l, movecurrentworkspacetomonitor, r
bind = $mainMod CONTROL SHIFT, j, movecurrentworkspacetomonitor, u
bind = $mainMod CONTROL SHIFT, k, movecurrentworkspacetomonitor, b
bind = $mainMod CONTROL SHIFT, Tab, movecurrentworkspacetomonitor, +1

# 設定リロード: Mod1+Shift+C
bind = $mainMod SHIFT, R, exec, hyprctl reload

# 再起動/終了メニュー (i3の Mode を Hyprlandの submap に変換)
bind = $mainMod, X, submap, system

# Discord 用 special workspace
bind = $mainMod, minus, togglespecialworkspace, discord

# Notion 用 special workspace
bind = $mainMod, backslash, togglespecialworkspace, notion

# 音楽用special workspace
bind = $mainMod, asciicircum, togglespecialworkspace, music

submap = system
# ログアウト (i3-msg exit の代わりに Hyprlandの終了コマンド)
bind = , L, exec, hyprctl dispatch exit
# リブート
bind = , R, exec, systemctl reboot
# シャットダウン
bind = , U, exec, systemctl poweroff
# Mode 終了
bind = , RETURN, submap, reset
bind = , ESCAPE, submap, reset
submap = reset # submap を終了


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# --- [ 7. Window Rules (i3-wm assign から移植) ] ---

# Discord(-ptb)
windowrule {
    name = disocrd(-ptb)
    match:class = ^(discord|discord-ptb)$
    workspace = special:discord silent
}
# Slack
windowrule {
    name = slack
    match:class = Slack
    workspace = special:discord silent
}
# Notion (Notionは class 名が異なる場合があるため、 title も設定)
windowrule {
    name = notion
    match:class = ^(Notion)|^(notion-app-electron)$
    workspace = special:notion silent
}
# YouTube Music (タイトルベースの指定)
# windowrule = workspace special:music, title:^(YouTube Music.*)$
windowrule {
    name = YouTube Music
    match:title = ^(YouTube Music|Spotify).*$
    workspace = special:music silent
}

