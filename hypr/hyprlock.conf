# ~/.config/hypr/hyprlock.conf

background {
    path = screenshot
    blur_passes = 1
    blur_size = 4
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.5)
    outer_color = rgba(0, 0, 0, 0)
    font_color = rgb(200, 200, 200)
    halign = center
    valign = center
}
